<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Window frame -->
  <rect width="820" height="400" rx="10" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5"/>
  <rect x="0" y="0" width="820" height="36" rx="10" fill="#3c3c3c"/>
  <rect x="0" y="18" width="820" height="18" fill="#3c3c3c"/>
  <circle cx="18" cy="18" r="7" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="7" fill="#febc2e"/>
  <circle cx="58" cy="18" r="7" fill="#28c840"/>
  <text x="410" y="23" text-anchor="middle" font-size="12" fill="#ccc">FileShare: Client-to-Client File Transfer</text>

  <!-- Main panel -->
  <rect x="0" y="36" width="820" height="364" fill="white"/>

  <!-- Header toolbar -->
  <rect x="0" y="36" width="820" height="48" fill="#add8e6"/>
  <rect x="10" y="47" width="190" height="26" rx="5" fill="#d2b48c"/>
  <text x="105" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">🔄 Refresh Server Files</text>
  <rect x="210" y="47" width="200" height="26" rx="5" fill="#d2b48c"/>
  <text x="310" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">🔄 Refresh Online Clients</text>
  <rect x="420" y="47" width="165" height="26" rx="5" fill="#64c864"/>
  <text x="502" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">📁 My Shared Files</text>

  <!-- Tabs -->
  <rect x="0" y="84" width="820" height="34" fill="#f0f0f0"/>
  <rect x="0" y="84" width="180" height="34" fill="#ddd" stroke="#ccc" stroke-width="1"/>
  <text x="90" y="106" text-anchor="middle" font-size="12" fill="#555">Server Files</text>
  <rect x="180" y="84" width="240" height="34" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Online Clients (Alice)</text>

  <!-- Table header -->
  <rect x="0" y="118" width="820" height="30" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Client ID</text>
  <text x="220" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">IP Address</text>
  <text x="330" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Port</text>
  <text x="420" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Status</text>
  <text x="620" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Action</text>
  <line x1="155" y1="118" x2="155" y2="148" stroke="#ddd" stroke-width="1"/>
  <line x1="290" y1="118" x2="290" y2="148" stroke="#ddd" stroke-width="1"/>
  <line x1="370" y1="118" x2="370" y2="148" stroke="#ddd" stroke-width="1"/>
  <line x1="460" y1="118" x2="460" y2="148" stroke="#ddd" stroke-width="1"/>

  <!-- Row 1: Bob -->
  <rect x="0" y="148" width="820" height="54" fill="white" stroke="#eee" stroke-width="1"/>
  <text x="90" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">Bob</text>
  <text x="220" y="180" text-anchor="middle" font-size="12" fill="#555">192.168.1.5</text>
  <text x="330" y="180" text-anchor="middle" font-size="12" fill="#555">12346</text>
  <text x="420" y="180" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">● Online</text>
  <!-- Action buttons -->
  <rect x="470" y="158" width="140" height="28" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="540" y="176" text-anchor="middle" font-size="11" fill="#333">📁 Browse Files</text>
  <rect x="620" y="158" width="130" height="28" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="685" y="176" text-anchor="middle" font-size="11" fill="#333">📤 Send File</text>

  <!-- Row 2: Charlie -->
  <rect x="0" y="202" width="820" height="54" fill="#fafafa" stroke="#eee" stroke-width="1"/>
  <text x="90" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Charlie</text>
  <text x="220" y="234" text-anchor="middle" font-size="12" fill="#555">192.168.1.9</text>
  <text x="330" y="234" text-anchor="middle" font-size="12" fill="#555">12346</text>
  <text x="420" y="234" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">● Online</text>
  <rect x="470" y="212" width="140" height="28" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="540" y="230" text-anchor="middle" font-size="11" fill="#333">📁 Browse Files</text>
  <rect x="620" y="212" width="130" height="28" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="685" y="230" text-anchor="middle" font-size="11" fill="#333">📤 Send File</text>

  <!-- Browse Files Dialog overlay -->
  <rect x="180" y="260" width="460" height="120" rx="8" fill="#fff" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="180" y="260" width="460" height="28" rx="8" fill="#4a90d9"/>
  <rect x="180" y="276" width="460" height="12" fill="#4a90d9"/>
  <text x="410" y="279" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Files from Bob</text>
  <text x="410" y="304" text-anchor="middle" font-size="11" fill="#555">Found 3 files from Bob</text>
  <!-- Mini file rows -->
  <text x="210" y="325" font-size="10.5" fill="#333">📄 resume_2025.docx</text>
  <text x="430" y="325" font-size="10" fill="#777">45 KB</text>
  <rect x="520" y="314" width="100" height="20" rx="4" fill="#64c8ff"/>
  <text x="570" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">⬇ Download</text>
  <text x="210" y="345" font-size="10.5" fill="#333">🖼️ photo.jpg</text>
  <text x="430" y="345" font-size="10" fill="#777">2,100 KB</text>
  <rect x="520" y="334" width="100" height="20" rx="4" fill="#64c8ff"/>
  <text x="570" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">⬇ Download</text>
  <text x="210" y="365" font-size="10.5" fill="#333">📦 archive.zip</text>
  <text x="430" y="365" font-size="10" fill="#777">8,900 KB</text>
  <rect x="520" y="354" width="100" height="20" rx="4" fill="#64c8ff"/>
  <text x="570" y="368" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">⬇ Download</text>

  <!-- Caption -->
  <text x="410" y="394" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Fig 3. Online Clients tab — browse a peer's shared folder and download files directly</text>
</svg>
