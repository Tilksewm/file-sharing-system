<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="380" fill="#f8f9fb" rx="12"/>
  <text x="380" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">TCP vs UDP — Transfer Mode Comparison</text>

  <!-- TCP Column -->
  <rect x="40" y="55" width="320" height="290" rx="10" fill="#eaf4fb" stroke="#2980b9" stroke-width="2"/>
  <rect x="40" y="55" width="320" height="40" rx="10" fill="#2980b9"/>
  <rect x="40" y="83" width="320" height="12" fill="#2980b9"/>
  <text x="200" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="white">TCP — Reliable</text>

  <!-- TCP rows -->
  <text x="60" y="118" font-size="11" font-weight="bold" fill="#1a5276">Protocol</text>
  <text x="200" y="118" font-size="11" fill="#333">Transmission Control Protocol</text>

  <line x1="55" y1="128" x2="345" y2="128" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="148" font-size="11" font-weight="bold" fill="#1a5276">Delivery</text>
  <text x="200" y="148" font-size="11" fill="#27ae60" font-weight="bold">✓ Guaranteed, ordered</text>

  <line x1="55" y1="158" x2="345" y2="158" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="178" font-size="11" font-weight="bold" fill="#1a5276">Error handling</text>
  <text x="200" y="178" font-size="11" fill="#27ae60" font-weight="bold">✓ Auto retransmit</text>

  <line x1="55" y1="188" x2="345" y2="188" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="208" font-size="11" font-weight="bold" fill="#1a5276">Speed</text>
  <text x="200" y="208" font-size="11" fill="#e67e22">Moderate (handshake overhead)</text>

  <line x1="55" y1="218" x2="345" y2="218" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="238" font-size="11" font-weight="bold" fill="#1a5276">Use case</text>
  <text x="200" y="238" font-size="11" fill="#333">Critical files, documents</text>

  <line x1="55" y1="248" x2="345" y2="248" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="268" font-size="11" font-weight="bold" fill="#1a5276">Port</text>
  <text x="200" y="268" font-size="11" fill="#555">5000 (server) / 12346 (P2P)</text>

  <line x1="55" y1="278" x2="345" y2="278" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="298" font-size="11" font-weight="bold" fill="#1a5276">Buffer size</text>
  <text x="200" y="298" font-size="11" fill="#555">8192 bytes</text>

  <line x1="55" y1="308" x2="345" y2="308" stroke="#d0e8f5" stroke-width="1"/>
  <text x="60" y="328" font-size="11" font-weight="bold" fill="#1a5276">Recommendation</text>
  <text x="200" y="328" font-size="11" fill="#27ae60" font-weight="bold">✓ Always safe to use</text>

  <!-- UDP Column -->
  <rect x="400" y="55" width="320" height="290" rx="10" fill="#fef9f0" stroke="#e67e22" stroke-width="2"/>
  <rect x="400" y="55" width="320" height="40" rx="10" fill="#e67e22"/>
  <rect x="400" y="83" width="320" height="12" fill="#e67e22"/>
  <text x="560" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="white">UDP — Efficient</text>

  <!-- UDP rows -->
  <text x="420" y="118" font-size="11" font-weight="bold" fill="#784212">Protocol</text>
  <text x="560" y="118" font-size="11" fill="#333">User Datagram Protocol</text>

  <line x1="415" y1="128" x2="705" y2="128" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="148" font-size="11" font-weight="bold" fill="#784212">Delivery</text>
  <text x="560" y="148" font-size="11" fill="#e74c3c" font-weight="bold">⚠ Best-effort, no guarantee</text>

  <line x1="415" y1="158" x2="705" y2="158" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="178" font-size="11" font-weight="bold" fill="#784212">Error handling</text>
  <text x="560" y="178" font-size="11" fill="#e74c3c" font-weight="bold">⚠ Logged only, no retry</text>

  <line x1="415" y1="188" x2="705" y2="188" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="208" font-size="11" font-weight="bold" fill="#784212">Speed</text>
  <text x="560" y="208" font-size="11" fill="#27ae60">Faster on reliable networks</text>

  <line x1="415" y1="218" x2="705" y2="218" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="238" font-size="11" font-weight="bold" fill="#784212">Use case</text>
  <text x="560" y="238" font-size="11" fill="#333">Large files on LAN</text>

  <line x1="415" y1="248" x2="705" y2="248" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="268" font-size="11" font-weight="bold" fill="#784212">Port</text>
  <text x="560" y="268" font-size="11" fill="#555">5000 (server only)</text>

  <line x1="415" y1="278" x2="705" y2="278" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="298" font-size="11" font-weight="bold" fill="#784212">Buffer size</text>
  <text x="560" y="298" font-size="11" fill="#555">4096 bytes + seq header</text>

  <line x1="415" y1="308" x2="705" y2="308" stroke="#fde8c8" stroke-width="1"/>
  <text x="420" y="328" font-size="11" font-weight="bold" fill="#784212">Recommendation</text>
  <text x="560" y="328" font-size="11" fill="#e67e22" font-weight="bold">Use only on local networks</text>

  <!-- Caption -->
  <text x="380" y="368" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Fig 5. TCP vs UDP — choose based on network reliability and file importance</text>
</svg>
