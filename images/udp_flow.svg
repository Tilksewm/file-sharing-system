<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="340" fill="#f8f9fb" rx="12"/>

  <text x="380" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">UDP File Transfer — Packet Flow</text>

  <!-- Client side -->
  <rect x="40" y="55" width="160" height="240" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <rect x="40" y="55" width="160" height="36" rx="8" fill="#4a90d9"/>
  <rect x="40" y="79" width="160" height="12" fill="#4a90d9"/>
  <text x="120" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Client (Sender)</text>
  <text x="120" y="106" text-anchor="middle" font-size="11" fill="#2c3e50">FileClientGUI.java</text>
  <text x="120" y="122" text-anchor="middle" font-size="10" fill="#555">uploadFileUDP()</text>
  <line x1="55" y1="133" x2="185" y2="133" stroke="#ddd" stroke-width="1"/>

  <text x="120" y="152" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="bold">1. Read file chunks</text>
  <text x="120" y="168" text-anchor="middle" font-size="10" fill="#555">buffer = 4096 bytes</text>
  <text x="120" y="190" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="bold">2. Wrap each chunk:</text>
  <text x="120" y="206" text-anchor="middle" font-size="9.5" fill="#555">writeUTF("DATA")</text>
  <text x="120" y="220" text-anchor="middle" font-size="9.5" fill="#555">writeInt(seq++)</text>
  <text x="120" y="234" text-anchor="middle" font-size="9.5" fill="#555">writeInt(length)</text>
  <text x="120" y="248" text-anchor="middle" font-size="9.5" fill="#555">write(bytes)</text>
  <text x="120" y="268" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="bold">3. Send DatagramPacket</text>

  <!-- Server side -->
  <rect x="560" y="55" width="160" height="240" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="560" y="55" width="160" height="36" rx="8" fill="#27ae60"/>
  <rect x="560" y="79" width="160" height="12" fill="#27ae60"/>
  <text x="640" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Server (Receiver)</text>
  <text x="640" y="106" text-anchor="middle" font-size="11" fill="#2c3e50">FileServer.java</text>
  <text x="640" y="122" text-anchor="middle" font-size="10" fill="#555">UDP Thread</text>
  <line x1="575" y1="133" x2="705" y2="133" stroke="#ddd" stroke-width="1"/>

  <text x="640" y="152" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">1. Detect START signal</text>
  <text x="640" y="168" text-anchor="middle" font-size="9.5" fill="#555">open FileOutputStream</text>
  <text x="640" y="190" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">2. Parse DATA packets</text>
  <text x="640" y="206" text-anchor="middle" font-size="9.5" fill="#555">read type, seq, length</text>
  <text x="640" y="220" text-anchor="middle" font-size="9.5" fill="#555">check seq == last+1</text>
  <text x="640" y="234" text-anchor="middle" font-size="9.5" fill="#555">fos.write(fileData)</text>
  <text x="640" y="254" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">3. END → close file</text>

  <!-- Packets in between -->
  <!-- START packet -->
  <rect x="230" y="68" width="300" height="28" rx="6" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="380" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">START:filename.zip:15800000</text>
  <polygon points="525,82 535,82 530,92" fill="#f0ad4e"/>
  <line x1="200" y1="82" x2="525" y2="82" stroke="#f0ad4e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DATA packet 0 -->
  <rect x="230" y="118" width="300" height="28" rx="6" fill="#d1ecf1" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="380" y="136" text-anchor="middle" font-size="11" fill="#0c5460">DATA | seq=0 | len=4096 | [bytes...]</text>
  <polygon points="525,132 535,132 530,142" fill="#4a90d9"/>
  <line x1="200" y1="132" x2="525" y2="132" stroke="#4a90d9" stroke-width="1.5"/>

  <!-- DATA packet 1 -->
  <rect x="230" y="160" width="300" height="28" rx="6" fill="#d1ecf1" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="380" y="178" text-anchor="middle" font-size="11" fill="#0c5460">DATA | seq=1 | len=4096 | [bytes...]</text>
  <polygon points="525,174 535,174 530,184" fill="#4a90d9"/>
  <line x1="200" y1="174" x2="525" y2="174" stroke="#4a90d9" stroke-width="1.5"/>

  <!-- DATA packet N (skipped) -->
  <text x="380" y="208" text-anchor="middle" font-size="13" fill="#aaa">· · ·</text>

  <!-- DATA packet N (out of order warning) -->
  <rect x="230" y="220" width="300" height="28" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="380" y="238" text-anchor="middle" font-size="11" fill="#721c24">DATA | seq=47 | ⚠ expected 45</text>
  <polygon points="525,234 535,234 530,244" fill="#dc3545"/>
  <line x1="200" y1="234" x2="525" y2="234" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- END packet -->
  <rect x="230" y="268" width="300" height="28" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1.5"/>
  <text x="380" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">END</text>
  <polygon points="525,282 535,282 530,292" fill="#27ae60"/>
  <line x1="200" y1="282" x2="525" y2="282" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Arrows from client -->
  <line x1="200" y1="82" x2="230" y2="82" stroke="#f0ad4e" stroke-width="1.5"/>
  <line x1="200" y1="132" x2="230" y2="132" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="200" y1="174" x2="230" y2="174" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="200" y1="234" x2="230" y2="234" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="200" y1="282" x2="230" y2="282" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Arrows to server -->
  <line x1="530" y1="82" x2="560" y2="82" stroke="#f0ad4e" stroke-width="1.5"/>
  <polygon points="558,78 566,82 558,86" fill="#f0ad4e"/>
  <line x1="530" y1="132" x2="560" y2="132" stroke="#4a90d9" stroke-width="1.5"/>
  <polygon points="558,128 566,132 558,136" fill="#4a90d9"/>
  <line x1="530" y1="174" x2="560" y2="174" stroke="#4a90d9" stroke-width="1.5"/>
  <polygon points="558,170 566,174 558,178" fill="#4a90d9"/>
  <line x1="530" y1="234" x2="560" y2="234" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="558,230 566,234 558,238" fill="#dc3545"/>
  <line x1="530" y1="282" x2="560" y2="282" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="558,278 566,282 558,286" fill="#27ae60"/>

  <!-- Caption -->
  <text x="380" y="328" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Fig 4. UDP packet sequence — out-of-order packets are logged but not retransmitted</text>
</svg>
